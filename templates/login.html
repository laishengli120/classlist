{% extends 'base.html' %}

{% block content %}
<section class="panel narrow-panel">
    <p class="eyebrow">管理员</p>
    <h1>登录</h1>
    <form class="stack-form" method="post">
        <label>
            <span>用户名</span>
            <input type="text" name="username" placeholder="用户名" autocomplete="off" required>
        </label>
        <label>
            <span>密码</span>
            <input type="password" name="password" placeholder="密码" autocomplete="off" required>
        </label>
        <input class="btn primary" type="submit" name="submit" value="登录">
    </form>
</section>
{% endblock %}
