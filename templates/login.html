{% extends "base.html" %}

{% block title %}登录 · {{ app_name }}{% endblock %}

{% block content %}
<section class="login-card">
    <div class="login-intro">
        <span class="brand-mark">绩</span>
        <p class="eyebrow">Warm Minimal Academic Workspace</p>
        <h1>教师成绩工作台</h1>
        <p>用安静、克制的方式记录考试、观察学生变化，并把教学判断放在数据之前。</p>
    </div>
    <form class="stack-form" method="post">
        <label>
            <span>用户名</span>
            <input type="text" name="username" placeholder="admin" autocomplete="username" required>
        </label>
        <label>
            <span>密码</span>
            <input type="password" name="password" placeholder="admin" autocomplete="current-password" required>
        </label>
        <button class="btn primary" type="submit">登录</button>
    </form>
</section>
{% endblock %}
