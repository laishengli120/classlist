{% extends "base.html" %}

{% block content %}
<section class="panel narrow-panel">
    <p class="eyebrow">偏好设置</p>
    <h1>账号设置</h1>
    <form class="stack-form" method="post">
        <label>
            <span>显示名称</span>
            <input type="text" name="name" placeholder="用户名" autocomplete="off" required value="{{ current_user.name }}">
        </label>
        <input class="btn primary" type="submit" name="submit" value="保存">
    </form>
</section>
{% endblock %}
